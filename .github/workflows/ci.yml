name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  scan_ruby:
    name: Brakeman + bundler-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: |
          mkdir -p tmp
          bin/brakeman --no-pager | tee tmp/brakeman.txt

      - name: Summarize Brakeman findings on failure
        if: failure()
        run: |
          {
            echo "## Brakeman findings"
            echo '```'
            cat tmp/brakeman.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Scan for known security vulnerabilities in gems used
        run: |
          mkdir -p tmp
          bin/bundler-audit | tee tmp/bundler-audit.txt

      - name: Summarize vulnerable gems on failure
        if: failure()
        run: |
          {
            echo "## Vulnerable gems (bundler-audit)"
            echo '```'
            cat tmp/bundler-audit.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  scan_js:
    name: importmap audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: |
          mkdir -p tmp
          bin/importmap audit | tee tmp/importmap-audit.txt

      - name: Summarize vulnerable JavaScript dependencies on failure
        if: failure()
        run: |
          {
            echo "## Vulnerable JavaScript dependencies (importmap audit)"
            echo '```'
            cat tmp/importmap-audit.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v6
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: |
          mkdir -p tmp
          bin/rubocop -f github -f offenses -o tmp/rubocop-offenses.txt

      - name: Summarize RuboCop offenses on failure
        if: failure()
        run: |
          {
            echo "## RuboCop offenses"
            echo '```'
            cat tmp/rubocop-offenses.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: |
          mkdir -p tmp
          bin/rails db:test:prepare test 2>&1 | tee tmp/test.log

      - name: Summarize test failures on failure
        if: failure()
        run: |
          {
            echo "## Test failures"
            echo '```'
            tail -60 tmp/test.log 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage data
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          include-hidden-files: true
          if-no-files-found: warn

  system-test:
    name: System tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run System Tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          HEADLESS: "1"
          SKIP_COVERAGE_FLOOR: "1"
        run: |
          mkdir -p tmp
          bin/rails db:test:prepare test:system 2>&1 | tee tmp/system-test.log

      - name: Summarize system test failures on failure
        if: failure()
        run: |
          {
            echo "## System test failures"
            echo '```'
            tail -60 tmp/system-test.log 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo ""
            echo "_Screenshots of failed system tests are uploaded as the **screenshots** artifact on this run._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  test_js:
    name: JS unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Run JS unit tests (Vitest, with coverage gate)
        run: |
          mkdir -p tmp
          npm run test:js 2>&1 | tee tmp/js-test.log

      - name: Summarize JS test failures on failure
        if: failure()
        run: |
          {
            echo "## JS unit test failures (Vitest)"
            echo '```'
            tail -60 tmp/js-test.log 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: JS coverage summary
        if: ${{ !cancelled() }}
        run: |
          S=tmp/js-coverage/coverage-summary.json
          {
            echo "## JS coverage (Vitest)"
            if [ -f "$S" ]; then
              echo "| Lines | Branches | Functions | Statements |"
              echo "|------:|---------:|----------:|-----------:|"
              jq -r '.total | "| \(.lines.pct)% | \(.branches.pct)% | \(.functions.pct)% | \(.statements.pct)% |"' "$S"
            else
              echo "(no coverage summary produced)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JS coverage summary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: js-coverage
          path: tmp/js-coverage/coverage-summary.json
          if-no-files-found: warn

  python_tools:
    name: Python tool (map generator)
    runs-on: ubuntu-latest
    env:
      POKEYELLOW: ${{ github.workspace }}/tmp/pokeyellow
      PY_COVERAGE_FLOOR: "87"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/maps/requirements-dev.txt

      - name: Install Python deps
        run: pip install -r tools/maps/requirements-dev.txt

      - name: Clone the pinned pokeyellow disassembly
        run: |
          REF=$(cat tools/maps/.pokeyellow-ref)
          git clone --filter=blob:none --no-checkout https://github.com/pret/pokeyellow "$POKEYELLOW"
          git -C "$POKEYELLOW" checkout --detach "$REF"
          test -f "$POKEYELLOW/constants/map_constants.asm"
          echo "pokeyellow @ $REF"

      - name: Lint (ruff)
        run: |
          mkdir -p tmp
          ruff check tools/maps 2>&1 | tee tmp/ruff.log

      - name: Summarize ruff findings on failure
        if: failure()
        run: |
          {
            echo "## Python lint (ruff)"
            echo '```'
            cat tmp/ruff.log 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run generator tests (pytest, with coverage gate)
        working-directory: tools/maps
        run: |
          mkdir -p ../../tmp
          python -m pytest -q -rs \
            --cov --cov-report=term --cov-report=json:../../tmp/py-coverage.json \
            --cov-fail-under="$PY_COVERAGE_FLOOR" 2>&1 | tee ../../tmp/pytest.log

      - name: Fail if any test skipped (the suite self-skips without the disassembly)
        run: |
          if grep -qE '[0-9]+ skipped' tmp/pytest.log; then
            echo "::error::pytest skipped tests - the pinned pokeyellow checkout is probably missing or stale"
            exit 1
          fi

      - name: Summarize generator test failures on failure
        if: failure()
        run: |
          {
            echo "## Generator test failures (pytest)"
            echo '```'
            tail -60 tmp/pytest.log 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo ""
            echo "_A golden-manifest failure means \`yellow_maps.json\` no longer matches the game data: rerun \`tools/maps/build.py\` and review the diff._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Python coverage summary
        if: ${{ !cancelled() }}
        run: |
          S=tmp/py-coverage.json
          {
            echo "## Python coverage (pytest, tools/maps)"
            if [ -f "$S" ]; then
              echo "| Lines | Branches | Floor |"
              echo "|------:|---------:|------:|"
              jq -r --arg f "$PY_COVERAGE_FLOOR" '.totals |
                "| \(.percent_covered_display)% | \(.percent_branches_covered_display)% | \($f)% |"' "$S"
            else
              echo "(no coverage summary produced)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generator regression report and declared-drift gate
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        run: |
          mkdir -p tmp
          MANIFEST=app/models/walkthrough/yellow_maps.json
          git fetch --no-tags origin main:refs/remotes/origin/main || true
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- tools/maps "$MANIFEST")
          STATUS=0
          if [ -z "$CHANGED" ]; then
            echo "The map generator and its manifest are untouched on this branch." > tmp/python-regression.md
          else
            git show "origin/main:$MANIFEST" > tmp/base-manifest.json
            git log origin/main..HEAD --format=%B > tmp/branch-commits.txt
            printf 'Changed: %s\n\n' "$(echo "$CHANGED" | tr '\n' ' ')" > tmp/python-regression.md
            python tools/maps/manifest_diff.py tmp/base-manifest.json "$MANIFEST" \
              --expect-commits tmp/branch-commits.txt >> tmp/python-regression.md || STATUS=$?
          fi
          {
            echo "## Generator regression (tools/maps)"
            cat tmp/python-regression.md
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$STATUS" -ne 0 ]; then
            echo "::error::Manifest drift does not match the 'Manifest-drift:' trailer on this branch. See the job summary for the maps involved."
          fi
          exit "$STATUS"

      - name: Upload generator regression report
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: python-regression
          path: tmp/python-regression.md
          if-no-files-found: warn

  coverage:
    name: Coverage (changed lines)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [ test ]
    permissions:
      contents: read
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y cmake pkg-config

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Download coverage data from test job
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage

      - name: Coverage of changed lines (undercover)
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main || true
          bundle exec undercover --compare origin/main | tee undercover-report.txt

      - name: Coverage summary
        if: ${{ !cancelled() }}
        run: |
          LINE=$(jq -r '.result.line' coverage/.last_run.json 2>/dev/null || echo "?")
          BRANCH=$(jq -r '.result.branch' coverage/.last_run.json 2>/dev/null || echo "?")
          {
            echo "## Coverage"
            echo "- Total line coverage: **${LINE}%**"
            echo "- Total branch coverage: **${BRANCH}%**"
            echo ""
            echo "### Changed lines (undercover)"
            echo '```'
            cat undercover-report.txt 2>/dev/null || echo "(no report)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload undercover report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: undercover-report
          path: undercover-report.txt
          if-no-files-found: warn

  code_quality:
    name: Code smells (changed files)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Reek on changed Ruby files (advisory)
        continue-on-error: true
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main || true
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- 'app/**/*.rb' 'lib/**/*.rb' | tr '\n' ' ')
          if [ -z "$CHANGED" ]; then
            echo "No changed Ruby files." | tee reek-report.txt
          else
            echo "Reek on: $CHANGED"
            bundle exec reek --force-exclusion $CHANGED | tee reek-report.txt || true
          fi

      - name: Code-smell summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo "## Code smells — reek (changed files)"
            echo '```'
            if [ -s reek-report.txt ]; then cat reek-report.txt; else echo "No code smells on changed files."; fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reek report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: reek-report
          path: reek-report.txt
          if-no-files-found: warn

  brakeman_sarif:
    name: Brakeman (code scanning)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Brakeman SARIF
        run: bin/brakeman -f sarif -o brakeman.sarif.json --no-pager || true

      - name: Upload Brakeman SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: brakeman.sarif.json
          category: brakeman

  semgrep_diff:
    name: Semgrep (new findings)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pipx install semgrep==1.165.0

      - name: Semgrep scan
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main || true
          COMMON="--config p/ruby --config p/security-audit --sarif --output semgrep.sarif --metrics off"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=$(git merge-base origin/main HEAD)
            semgrep scan $COMMON --baseline-commit "$BASE"
          else
            semgrep scan $COMMON
          fi

      - name: Render Semgrep findings
        if: ${{ !cancelled() && hashFiles('semgrep.sarif') != '' }}
        run: |
          UNSUPPRESSED='[.runs[].results[]? | select((.suppressions // []) | length == 0)]'
          COUNT=$(jq -r "$UNSUPPRESSED | length" semgrep.sarif)
          SUPPRESSED=$(jq -r '[.runs[].results[]? | select((.suppressions // []) | length > 0)] | length' semgrep.sarif)
          if [ "$COUNT" -eq 0 ]; then
            echo "No new Semgrep findings. (${SUPPRESSED} in-source nosemgrep suppressions.)" | tee semgrep-findings.txt
          else
            jq -r "$UNSUPPRESSED"' | .[] |
              "---\nRULE: \(.ruleId)\nFILE: \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)\nCODE: \((.locations[0].physicalLocation.region.snippet.text // "(no snippet)") | gsub("\n"; " "))\nMSG:  \(.message.text | gsub("\n"; " "))"
            ' semgrep.sarif | tee semgrep-findings.txt
          fi
          {
            echo "## Semgrep (new findings)"
            echo "**Count:** $COUNT"
            echo ""
            echo '```'
            cat semgrep-findings.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$COUNT" -gt 0 ]; then
            echo "::error::Semgrep reported $COUNT new finding(s) — see Render step above for details."
            exit 1
          fi

      - name: Upload Semgrep findings (text)
        if: ${{ !cancelled() && hashFiles('semgrep-findings.txt') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-findings
          path: semgrep-findings.txt
          if-no-files-found: warn

      - name: Strip suppressed findings from SARIF
        if: ${{ !cancelled() && hashFiles('semgrep.sarif') != '' }}
        run: |
          jq '.runs |= map(.results |= map(select((.suppressions // []) | length == 0)))' \
            semgrep.sarif > semgrep.sarif.filtered
          mv semgrep.sarif.filtered semgrep.sarif

      - name: Upload Semgrep SARIF
        if: ${{ !cancelled() && hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  secret_scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency_review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          license-check: false
          comment-summary-in-pr: on-failure

  report:
    name: PR quality report
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [ coverage, code_quality, semgrep_diff, test_js, python_tools ]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download reports
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Assemble comment
        run: |
          LR=artifacts/coverage/.last_run.json
          LINE=$(jq -r '.result.line' "$LR" 2>/dev/null || echo "?")
          BRANCH=$(jq -r '.result.branch' "$LR" 2>/dev/null || echo "?")
          JS=artifacts/js-coverage/coverage-summary.json
          {
            echo "## CI quality summary"
            echo ""
            echo "### Coverage — Ruby (SimpleCov)"
            echo "- Total line coverage: **${LINE}%**"
            echo "- Total branch coverage: **${BRANCH}%**"
            echo ""
            echo "### Coverage — JS (Vitest, Stimulus controllers)"
            if [ -f "$JS" ]; then
              jq -r '.total | "- Lines: **\(.lines.pct)%** · Branches: **\(.branches.pct)%** · Functions: **\(.functions.pct)%** · Statements: **\(.statements.pct)%**"' "$JS"
            else
              echo "- (no JS coverage summary)"
            fi
            echo ""
            echo "Changed lines (undercover):"
            echo '```'
            cat artifacts/undercover-report/undercover-report.txt 2>/dev/null || echo "n/a"
            echo '```'
            echo "### Code smells — reek (changed files)"
            echo '```'
            if [ -s artifacts/reek-report/reek-report.txt ]; then cat artifacts/reek-report/reek-report.txt; else echo "No code smells on changed files."; fi
            echo '```'
            echo "### Semgrep (new findings)"
            echo '```'
            cat artifacts/semgrep-findings/semgrep-findings.txt 2>/dev/null || echo "n/a"
            echo '```'
            echo "### Generator regression (tools/maps)"
            cat artifacts/python-regression/python-regression.md 2>/dev/null || echo "n/a"
            echo ""
            echo "_Brakeman findings appear under **Security ▸ Code scanning**. Secret-scan and dependency-review report inline on failure._"
          } > comment.md

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: ci-quality
          path: comment.md
