services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: porynet_web
      POSTGRES_PASSWORD: porynet_web
      POSTGRES_DB: porynet_web_development
    ports: ["127.0.0.1:${DATABASE_PORT:-5432}:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porynet_web"]
      interval: 5s

volumes:
  postgres_data:
