    yellow:
      marquee:
        - "PALLET → CHAMPION"
        - "CATCH-EVERYTHING ROUTE"
        - "OAK CHALLENGE BUILT IN"
        - "EVERY KANTO STOP"
      hero:
        badge: "GEN 1 · KANTO · WALKTHROUGH 01"
        lead: "A no-fluff, catch-everything walkthrough for all of Kanto. Just what to do to progress, and exactly which Pokémon you can catch at every step."
      route:
        h2: "Pallet Town → Indigo Plateau"
        lead: "Follow it in order. Each stop opens its own page with catch lists, trainers, items and hidden-item maps."
      oak_sum:
        eyebrow: "OAK CHALLENGE · FIRST CATCHES"
        h2: "The families to register first."
      slice_oak:
        caterpie: "Viridian Forest. Evolves to Butterfree, a rare answer to Brock."
        pidgey: "Routes 1–2 and the forest. Common, evolves fully."
        nidoranf: "Route 22. A strong line that carries into Nidoqueen."
        nidoranm: "Route 22. Low Kick and full evolution to Nidoking."
        mankey: "Route 22. Low Kick shreds Brock's Rock types."
        spearow: "Route 22. Early Normal/Flying, evolves to Fearow."
      legs:
        leg_01:
          lead: "The opening stretch of Kanto. Your home town and first wild grass."
        leg_02:
          lead: "Viridian's errands and the routes that ring it, right up to the gate of Viridian Forest."
        leg_03:
          lead: "Brock's Boulder Badge and the climb east toward Mt. Moon."
        leg_04:
          lead: "Out of Mt. Moon to Cerulean and Misty, then the Nugget Bridge routes up to Bill's cottage."
        leg_05:
          lead: "South from Cerulean to Vermilion City and Lt. Surge, via the Underground Path shortcut."
        leg_06:
          lead: "The grassy leg east of Vermilion, leading to the mouth of Diglett's Cave."
        leg_07:
          lead: "East and south from Cerulean toward the dark maze of Rock Tunnel."
        leg_08:
          lead: "Out of Rock Tunnel to Lavender, then west to Celadon's department store and Erika's gym."
        leg_09:
          lead: "The southern fishing routes down to Fuchsia, Koga's gym, and the Safari Zone."
        leg_10:
          lead: "Down Cycling Road and into Saffron for Sabrina. Once Silph Co. is freed."
        leg_11:
          lead: "The open water south of Fuchsia, out toward the Seafoam Islands."
        leg_12:
          lead: "Cinnabar's fossils and Blaine, then back to Viridian for Giovanni and the final badge."
        leg_13:
          lead: "The badge-gated road to the Pokémon League and Victory Road."
      locations:
        pallet_town:
          note: "Get Pikachu from Prof. Oak. No wild grass here."
          intro: "Home. Grab your partner Pikachu, settle the first rival battle, and head north."
          trivia:
            title: "This battle decides your rival's Eevee"
            intro: "The outcome of this battle, plus an optional rematch on Route 22, locks in which evolution your rival's Eevee takes. Play it how you like, but here's the recipe for each."
            note: "// The Route 22 rematch only matters if you win here first; lose, and it's Vaporeon regardless."
            cards:
              vaporeon:
                this: "Lose this battle"
                rt22: "Route 22 result ignored"
              jolteon:
                this: "Win this battle"
                rt22: "Win the Route 22 battle too"
              flareon:
                this: "Win this battle"
                rt22: "Skip the Route 22 battle"
          steps:
            "1":
              title: "Withdraw the free Potion"
              text: "In your upstairs bedroom, check the PC and withdraw the free Potion, then head downstairs and out the front door."
              items:
                potion: "Upstairs bedroom, inside the PC."
            "2":
              title: "Get Pikachu from Oak"
              text: "Head for the north exit. The moment you step into the Route 1 grass, Oak stops you and walks you back to his lab, where he hands you Pikachu. From here it walks beside you instead of riding in a Ball."
            "3":
              title: "Beat your rival"
              text_html: "Blue grabs an Eevee and battles you in the lab. It is Lv 5 with Tackle and Tail Whip; lead with Pikachu and use ThunderShock. Win for <span class=\"pn-money-value\"><span class=\"pn-money\" role=\"img\" aria-label=\"Poké Dollar\"></span><span class=\"pn-money-value__n\">175</span></span>. Heads up: this result is half of what decides <a href=\"%{href}\">which evolution his Eevee takes</a>, so pick your outcome on purpose."
            "4":
              title: "Head north to Route 1"
              text: "Leave Pallet by the north exit onto Route 1, and press on toward Viridian City."
          tips:
            pikachu: "Your forced partner and the only Pikachu in the game. It refuses the Thunder Stone, so it stays Pikachu."
        route_1:
          note: "First grass patch. Pidgey and Rattata."
          intro: "The short road north to Viridian. Your first wild grass. Level Pikachu on the way."
          steps:
            "1":
              title: "Sweep the tall grass"
              text: "Head north through the tall grass, battling wild Pidgey and Rattata to level Pikachu. You have no Poké Balls yet, so just battle them for now; you can catch a Pidgey and Rattata on the way back once you buy Balls at the Viridian Mart."
            "2":
              title: "Take the free Potion"
              text: "Near the north (Viridian) end, a man standing by the sign steps out to demo the shop and hands you a free Potion. Take it and keep north."
              items:
                potion: "From the man by the sign near the north (Viridian) exit."
            "3":
              title: "Enter Viridian City"
              text: "Continue north into Viridian City. On the way back later, hop down the ledges along the east side to skip the grass on the return trip."
          tips:
            pidgey: "Everywhere on Route 1. A reliable Normal/Flying that evolves all the way to Pidgeot."
            rattata: "Fast and common. Evolves into Raticate, a solid early attacker."
        viridian_city:
          note: "Catching tutorial, Oak's Parcel, stock up on Poké Balls."
          intro: "The gateway city. No wild grass. Run the errands, buy Poké Balls, then push into Route 2."
          later:
            tm42:
              where: "The Fisher who hands over TM42 (Dream Eater) sits on a fenced patch in the southwest corner, walled off by a cuttable tree and the pond. You can't cross to him on the first pass."
              after: "Chop the tree with HM01 Cut (from the S.S. Anne in Vermilion), or Surf across once you have HM03. Cut comes first."
          missable:
            title: "Five free Poké Balls"
            body_html: "Oak hands you <b>five Poké Balls</b> if you beat the Route 22 rival while carrying <b>none</b> and having caught <b>nothing but Pikachu</b>. Small prize, but if you want it, skip the Mart until after that fight."
            tip: "Pikachu goes in alone against his Spearow and Eevee, so grab a few levels in the Route 22 grass first."
          steps:
            "1":
              title: "Heal and collect Oak's Parcel"
              text: "Heal at the Poké Center in the top-left, then step into the Mart just northeast of it. The clerk hands you Oak's Parcel to carry back. The north exit is blocked by a dozing old man for now."
              items:
                oaks_parcel: "From the clerk in the Viridian Mart; deliver it to Oak in Pallet Town."
            "2":
              title: "Deliver Oak's Parcel"
              text: "Take the Parcel south to Oak's lab in Pallet Town, where he gives you the Pokédex."
            "3":
              title: "Grab the Town Map"
              text: "While you are in Pallet for the Pokédex, step into Blue's house next door. His sister Daisy stands by the table; talk to her and she hands you the Town Map, which lays out every route and town in Kanto."
              items:
                town_map: "From Blue's sister Daisy, in the house just east of your own in Pallet Town."
            "4":
              title: "Watch the catching demo, then stock up"
              text_html: "Head back up to Viridian. The old man at the north exit is awake now; sit through his catching demo and he steps aside. Buy a stack of Poké Balls plus a few Potions and Antidotes at the Mart before you go. Or skip the Poké Balls for now if you want <a href=\"#missable-poke-balls\">Oak's five free ones</a>."
              hidden:
                potion: "On the tree just left of the north gate. Stand to its right and press A."
            "5":
              title: "Head west to Route 22"
              text: "The Viridian Gym stays locked until you hold the other seven badges, so skip it. Head west to Route 22 first for the best Brock-ready catches and a rival battle; from there you loop back through Viridian and up to Route 2."
        route_22:
          note: "Optional west route. Nidoran♀/♂, Mankey, Spearow. Plus the first rival battle."
          intro: "A short detour west of Viridian. The best spot to catch answers for Brock before the forest."
          steps:
            "1":
              title: "Cross the grass"
              text: "Head west from Viridian into the grass. Catch Nidoran♂/♀ and Mankey here. They beat Brock's Rock types."
            "2":
              title: "Beat the rival"
              text_html: "Blue challenges you near the water with Spearow (Lv 9) and Eevee (Lv 8). Win for <span class=\"pn-money-value\"><span class=\"pn-money\" role=\"img\" aria-label=\"Poké Dollar\"></span><span class=\"pn-money-value__n\">280</span></span>. This is the other half of <a href=\"%{href}\">the Eevee recipe</a>: if you won in Pallet, winning here locks Jolteon and skipping this fight locks Flareon."
            "3":
              title: "Optional: Oak's five Poké Balls"
              text_html: "Still carrying no Poké Balls, with only Pikachu caught? Walk back to Oak's Lab in Pallet Town and talk to him for <b>five free Poké Balls</b>. See the <a href=\"#missable-poke-balls\">missable note</a>."
            "4":
              title: "Turn back to Viridian"
              text: "The League gate further west is blocked until you have all badges. Head back east and up to Route 2."
          tips:
            nidoranf: "Catch one. Its line (Nidoqueen) is strong and covers Brock with Ground moves."
            nidoranm: "Learns Low Kick early and evolves to Nidoking. A top Brock answer."
            mankey: "Low Kick is super-effective on Brock's Rock types. Grab one."
            rattata: "Common filler here. Evolves to Raticate."
            spearow: "Early Normal/Flying; evolves to Fearow. Aggressive and easy to find."
          oak:
            nidoranf: "Its line reaches Nidoqueen. Log the base once."
            nidoranm: "Evolves to Nidoking and helps vs Brock. Log one."
            mankey: "Only easy spot for a while. Grab it for Brock."
            spearow: "Early Normal/Flying, evolves to Fearow."
        route_2:
          note: "Short leg into the forest. Pidgey, Rattata and Nidoran."
          intro: "The stretch between Viridian and the forest gate. Same catches as before, plus wild Nidoran."
          trades:
            mr_mime:
              npc: "SCIENTIST"
              title: "Mr. Mime"
              where: "The trade house on Route 2"
              note: "Yellow has no wild Mr. Mime, so this trade is the only way to add it. You need a spare Clefairy from Mt. Moon, so most players come back for it later."
          steps:
            "1":
              title: "Cross the south grass"
              text: "Walk north through the short grass. Catch a wild Nidoran here if you skipped Route 22."
            "2":
              title: "Enter Viridian Forest"
              text: "Step into the forest gate at the top and head straight through. The Cut-blocked east side comes much later."
          tips:
            pidgey: "The same reliable flyer as Route 1 if you still need one."
            rattata: "Common again. Skip it if you already caught one."
            nidoranf: "A second shot at Nidoran♀ if you skipped Route 22."
            nidoranm: "A second shot at Nidoran♂. Grab it for the Brock fight."
          oak:
            pidgey: "Common in the grass here, and by now you have Poké Balls. Log one; it evolves all the way to Pidgeot."
            rattata: "Everywhere on Route 2. Grab one for the dex; it evolves into Raticate."
        viridian_forest:
          note: "Bug haven. Caterpie, Metapod, Pidgey. Hidden items inside. No wild Pikachu in Yellow."
          intro: "The maze of trees between Route 2 and Pewter. Sweep the grass, grab the hidden items, and pick up a Caterpie for Brock."
          steps:
            "1":
              title: "Enter from the Route 2 gate"
              text: "Step in from the south. Tall grass lines the way. Your shot at Caterpie, Metapod and Pidgey. Grab the Poké Ball at the grassy dead-end to the northwest."
              items:
                poke_ball: "End of the grassy dead-end path, northwest of the south entrance."
            "2":
              title: "Check the lone tree"
              text: "Just north of the south entrance stands a single tree. Press A on its southwest square for a hidden Antidote."
              hidden:
                antidote: "Press A on the southwest square of the lone tree by the south entrance. Nothing shows on-screen."
            "3":
              title: "Climb the maze"
              text: "Wind north through the trees, battling the Lass and Bug Catchers for easy Pikachu XP. Grab the Potion in the northeast, by the Trainer Tips sign."
              items:
                potion: "Northeast of the forest, just northwest of the Trainer Tips sign."
            "4":
              title: "Reach the north exit"
              text: "Near the north gate, check the ground one square west of the Bug Catcher for a hidden Potion."
              hidden:
                potion: "One square west of the Bug Catcher standing south of the north exit."
            "5":
              title: "Leave for Pewter City"
              text: "Catch a Caterpie or Metapod before you go. Butterfree's Confusion is a rare good answer to Brock. Exit north onto Route 2, then into Pewter City."
          tips:
            caterpie: "Everywhere in the grass. Evolves fast into Butterfree, whose Confusion dents Brock."
            metapod: "Or just evolve your Caterpie at Lv 7. Cheaper than hunting the 25% spawn."
            pidgey: "Common here too if you still need one for the dex."
            pidgeotto: "A rare 1% spawn. A free evolved flyer if you're patient."
          oak:
            caterpie: "The forest's new family. Evolves to Butterfree. Log the base once."
        pewter_city:
          gym:
            intro: "A short, straight gym, no puzzle. Beat the lone Jr. Trainer on the way in, then Brock at the back. His Geodude (Lv 10) and Onix (Lv 12) shrug off Pikachu completely, so lead with Mankey's Low Kick, a Nidoran, or Butterfree's Confusion. When Onix uses Bide, stop attacking for two turns or it fires all the stored damage back at once."
          note: "Brock. The first Gym. Rock types; Electric does nothing."
          intro: "The first Gym city. Heal, prep a non-Electric attacker, and take the Boulder Badge from Brock."
          steps:
            "1":
              title: "Heal, prep, and enter the Gym"
              text: "Heal at the Poke Center and stock Potions at the Mart. Pikachu does nothing to Rock, so lead with Mankey, a Nidoran or Butterfree, then step into the Gym on the west side."
            "2":
              title: "Head east to Route 3"
              text: "With the Boulder Badge, the boy blocking the east exit steps aside. Head east onto Route 3 toward Mt. Moon."
        route_3:
          note: "The climb to Mt. Moon. Spearow, Sandshrew and Mankey."
          intro: "The trainer gauntlet east of Pewter. Grab a Ground type for the caves ahead, then heal at the Mt. Moon center."
          steps:
            "1":
              title: "Fight east up the route"
              text: "Head east from Pewter, clearing the Bug Catchers, Youngsters and Lasses as you climb."
            "2":
              title: "Sweep the grass"
              text: "Catch Spearow, Sandshrew or Mankey in the tall grass. Sandshrew and Mankey both help in the caves."
            "3":
              title: "Heal and enter Mt. Moon"
              text: "Heal at the Pokémon Center by the cave mouth, then step into Mt. Moon."
          oak:
            sandshrew: "Ground type, evolves to Sandslash. Handy against the coming caves."
        mt_moon:
          note: "Cave crawl. Zubat, Geodude, rare Clefairy, and a fossil."
          intro: "A dark cave full of Rockets. Grab the Moon Stone, pick a fossil, and push through to Cerulean."
          steps:
            "1":
              title: "Enter from Route 3"
              text: "Step in from the west (Route 3) entrance. Just inside, sweep the western chamber for TM12 (Water Gun) and a Potion before the tunnel splits and drops through its connected ladders."
            "2":
              title: "Work the floors for items"
              text: "As you wind down, grab the Rare Candy, Escape Rope and Potion in the southeast of 1F, the HP Up down the first south ladder, and TM01 (Mega Punch) on B2F. Two more items sit hidden in the rocks of B2F."
              hidden:
                moon_stone: "A second Moon Stone, hidden in the boulders near the middle of B2F. Press A on the rock just south of the ladder as you cross; nothing shows on-screen."
                ether: "Tucked inside the large rock beside TM01 (Mega Punch), in the northeast of B2F. Press A against the rock; nothing shows on-screen."
            "3":
              title: "Take the Moon Stone, beat the Rockets"
              text: "Pick up the Moon Stone in the northwest corner of 1F; it evolves Clefairy, Nidorina, Nidorino and more. Clear the Rocket Grunts on the lower floors, and in Yellow, Jessie & James turn up too."
            "4":
              title: "Choose a fossil, then exit"
              text: "Beat the last Super Nerd and pick ONE fossil: Dome (becomes Kabuto) or Helix (becomes Omanyte). The one you leave is gone for good. Fight Jessie & James by the stairs, then climb out to Route 4."
          tips:
            clefairy: "A 1% cave spawn. Grab one, then a Moon Stone turns it into Clefable."
          oak:
            clefairy: "Rare Moon-cave catch. Evolve it with a Moon Stone into Clefable."
            geodude: "Everywhere in the rock. Evolves to Graveler, then Golem by trade."
        route_4:
          note: "Short drop to Cerulean. Same grass as Route 3."
          intro: "The ledge down from Mt. Moon into Cerulean City. A quick one."
          steps:
            "1":
              title: "Leave Mt. Moon"
              text: "You come out on the western tip of Route 4. Heal at the Poké Center right by the cave mouth if you skipped the one inside, then drop east down the ledges."
            "2":
              title: "Grab TM04, drop into Cerulean"
              text: "On the way down, take TM04 (Whirlwind) on the second tier of the eastern hill, and check the northwest hill for a hidden Great Ball. The ledges feed straight down into Cerulean City."
        cerulean_city:
          gym:
            intro: "One Swimmer, a Jr. Trainer, and open floor, then Misty. Her Staryu (Lv 18) and Starmie (Lv 21) hit hard with Water moves, and Starmie's Recover drags the fight out, so close fast with an Electric or Grass attacker. Pikachu's ThunderShock is ideal."
          note: "Misty's Gym. Cascade Badge. Free Bulbasaur too."
          intro: "A water-gym city. Beat Misty, and if Pikachu likes you, claim a free Bulbasaur."
          steps:
            "1":
              title: "Heal, shop, and enter the Gym"
              text: "Arrive from Route 4, heal at the Center and stock the Mart, then enter the Gym. Lead with Pikachu or a Grass type against Misty's Water team."
            "2":
              title: "Grab the extras, then head north"
              text: "Take the free Bulbasaur from the girl's house if Pikachu's friendship is high. The burgled house near the north stays sealed until later; when the officer moves on, chase the thief out its back for TM28 (Dig). Then head north onto Nugget Bridge (Route 24)."
          tips:
            bulbasaur: "Free from the girl's house once Pikachu is happy. Evolves all the way to Venusaur."
          oak:
            bulbasaur: "Free gift from the girl's house → Venusaur. One is enough."
        route_24:
          note: "Nugget Bridge. Oddish, Bellsprout, and a free Charmander."
          intro: "Five trainers back-to-back, a Rocket, your rival. And a free Charmander waiting at the end."
          steps:
            "1":
              title: "Cross Nugget Bridge"
              text: "Beat the five trainers in a row, then the Rocket Grunt. Take the Nugget and decline joining Team Rocket."
            "2":
              title: "Beat your rival"
              text: "Blue challenges you just past the north end of the bridge. Win, then grab TM45 (Thunder Wave), hidden in the grass patch nearby."
            "3":
              title: "Take the free Charmander"
              text: "On the grassy hill to the northwest, a boy hands you a free Charmander (Lv 10). Take it, then head north to Route 25."
          tips:
            charmander: "Free from the boy here. A strong Fire line to Charizard, and a great answer to Erika later."
          oak:
            charmander: "Free gift → Charizard. Grab it for the dex and for Erika's grass gym."
            oddish: "Common in the grass. Evolves to Vileplume with a Leaf Stone."
            bellsprout: "The other 30% grass catch. Evolves to Victreebel with a Leaf Stone."
        route_25:
          note: "Bill's house. Same grass as Route 24."
          intro: "The path to Bill's cottage. Free him from his machine for the S.S. Anne ticket."
          steps:
            "1":
              title: "Fight east to the cottage"
              text: "Clear the Hikers and Youngsters along the route, and catch a Venonat if you still need one. TM19 (Seismic Toss) is tucked in the northeast corner of the fenced maze."
            "2":
              title: "Free Bill"
              text: "In the Sea Cottage, use Bill's machine to un-fuse him. He hands you the S.S. Ticket. Head back to Vermilion via Cerulean."
          oak:
            venonat: "A Bug/Poison catch → Venomoth. Log the base once."
        route_5:
          note: "South to Vermilion. Pidgey, Rattata and rare Abra."
          intro: "A short leg south of Cerulean. Catch an Abra here. It becomes one of the best Pokémon in the game."
          trades:
            machoke:
              npc: "LITTLE GIRL"
              title: "Machoke"
              where: "The Underground Path house at the north end of Route 5"
              note: "A fully evolved Machoke for a Cubone, and traded Pokémon earn boosted XP. Cubone comes from Pokémon Tower, so this is another return trip."
          steps:
            "1":
              title: "Head south"
              text: "Leave Cerulean south; drop a Pokémon at the Day Care if you want it leveled."
            "2":
              title: "Take the Underground Path"
              text: "Saffron's gates are blocked, so duck into the Underground Path building and tunnel south to Route 6. A hidden Full Restore and X Special lie along the tunnel floor."
          oak:
            abra: "Catch one fast (it only Teleports). Evolves to Kadabra, then Alakazam by trade."
        route_6:
          note: "Into Vermilion. Same grass as Route 5, plus fishing."
          intro: "The last stretch into Vermilion City. Fish the pond once you pick up a rod."
          steps:
            "1":
              title: "Leave the Underground Path"
              text: "Emerge at the north end and head south past the trainers."
            "2":
              title: "Enter Vermilion"
              text: "Continue south into Vermilion City."
        vermilion_city:
          gym:
            intro: "The door to Lt. Surge is locked behind two switches hidden in the trash cans. Find both, then face Surge's lone Raichu (Lv 28), which hits the whole team hard and can paralyze. A Ground type using Dig shuts it down cleanly, so bring Diglett, Sandshrew or a Nidoran line."
            puzzle:
              "1": "Check the trash cans along the walls to find the first switch. Its position is random on every visit."
              "2": "The second switch is always in a can directly next to the first, up, down, left or right. Pick wrong and both reset, so search the neighbors."
              "3": "With both switches flipped, the door to Lt. Surge opens. Bring a Ground type to shut his Electric team down."
          note: "Lt. Surge. Thunder Badge. Free Squirtle after."
          intro: "A port city with a puzzle-box gym. Board the S.S. Anne first for Cut, then take on Surge."
          steps:
            "1":
              title: "Grab the goodies"
              text: "Heal, then collect the Bike Voucher from the Fan Club and the Old Rod from the Fishing Guru."
            "2":
              title: "Board the S.S. Anne for Cut"
              text: "The gym's tree needs HM01 Cut. Board the ship at the south dock, clear the cabins, and cure the seasick Captain for Cut before you challenge Surge."
            "3":
              title: "Take the free Squirtle"
              text: "After the Thunder Badge, Officer Jenny hands you a free Squirtle. Then head east to Route 11 and Diglett's Cave."
          tips:
            squirtle: "Free from Officer Jenny after the Thunder Badge. The third Kanto starter, evolves to Blastoise."
          oak:
            squirtle: "Free gift after the badge → Blastoise. The last of the three starters."
        ss_anne:
          note: "The luxury liner. HM01 Cut, and a rival fight."
          intro: "A one-time boat. Sweep it for items, beat your rival, and get Cut before it sails away for good."
          steps:
            "1":
              title: "Clear the cabins for items"
              text: "Board at the south dock. The B1F cabins hold a Max Potion, an Ether and TM44 (Rest); on 1F grab TM08 (Body Slam) and check the kitchen's far trash can for a hidden Great Ball. Up on 2F, two cabins give a Max Ether and a Rare Candy. Battle the Sailors and Gentlemen as you sweep."
            "2":
              title: "Beat your rival"
              text: "Blue ambushes you by the stern stairs on 2F, just before the captain's room (Spearow Lv 19, Rattata Lv 16, Sandshrew Lv 18, Eevee Lv 20)."
            "3":
              title: "Get HM01 Cut"
              text: "Cure the seasick Captain in the stern cabin; he hands over HM01 Cut and TM24 (Thunderbolt). Teach Cut, then disembark. The instant you step off, the ship sails for good, so grab everything first."
        route_11:
          note: "East of Vermilion. Pidgey, Rattata, and Drowzee."
          intro: "A wide grass route east of Vermilion, with a cave shortcut back toward Pewter."
          trades:
            dugtrio:
              npc: "YOUNGSTER"
              title: "Dugtrio"
              where: "Upstairs in the Route 11 gate"
              note: "Hands you a Dugtrio so you can skip the 5% spawn in Diglett's Cave, and the trade gives it boosted XP."
          steps:
            "1":
              title: "Fight east"
              text: "Clear the Gamblers, Youngsters and Engineers as you head east; catch a Drowzee in the grass."
            "2":
              title: "Grab the Itemfinder"
              text: "Talk to Oak's Aide at the east gate for the Itemfinder (needs 30+ species). Diglett's Cave sits at the west end."
          oak:
            drowzee: "The route's notable catch → Hypno, a strong early Psychic."
        digletts_cave:
          note: "A shortcut tunnel. Diglett and rare Dugtrio."
          intro: "A one-tunnel cave of Diglett. A great place to grab a Dugtrio and shortcut back to Pewter."
          steps:
            "1":
              title: "Enter from Route 11"
              text: "Take the south entrance near the west end of Route 11 and follow the single tunnel."
            "2":
              title: "Exit toward Pewter"
              text: "Catch a Diglett or the rare Dugtrio, then exit north onto Route 2 below Pewter."
          oak:
            diglett: "Everywhere here → Dugtrio, a fast Ground type. Grab the base."
        route_9:
          note: "East to Rock Tunnel. Nidoran hotspot."
          intro: "A long grass route east of Cerulean, thick with both Nidoran lines."
          steps:
            "1":
              title: "Cut east"
              text: "Cut the tree at the gate and head east through the grass, clearing the Bug Catchers and Hikers."
            "2":
              title: "Grab TM30"
              text: "Detour southwest for TM30 (Teleport) and check the NW tree for a hidden Ether."
            "3":
              title: "Reach Route 10"
              text: "Continue east; the route feeds straight into Route 10 and Rock Tunnel."
        route_10:
          note: "Rock Tunnel's doorstep. Magnemite everywhere."
          intro: "A short route around Rock Tunnel's north mouth. Magnemite dominates the grass."
          steps:
            "1":
              title: "Heal at the Center"
              text: "Head south to the Pokémon Center beside Rock Tunnel's north entrance."
            "2":
              title: "Catch a Magnemite"
              text: "Sweep the grass for Magnemite and Machop before the tunnel."
            "3":
              title: "Enter Rock Tunnel"
              text: "Teach a Pokémon Flash first, then step into the tunnel's north mouth."
          oak:
            magnemite: "A 50% grass catch here → Magneton. Electric coverage for the dark tunnel."
        rock_tunnel:
          note: "Pitch-black cave. Needs Flash."
          intro: "A two-floor maze that's black without Flash. Onix, Machop and Geodude live inside."
          steps:
            "1":
              title: "Use Flash"
              text: "Teach HM05 Flash (girl on Route 2) before entering, then light each screen inside."
            "2":
              title: "Wind down and back up"
              text: "Take the ladders to B1F, cross past the Hikers, and climb back to 1F on the far side."
            "3":
              title: "Exit to Lavender"
              text: "Leave the south mouth onto lower Route 10 and walk into Lavender Town."
          oak:
            machop: "Cave-common → Machoke, then Machamp by trade. A strong Fighter."
            onix: "Only appears on B1F. A bulky Rock/Ground catch worth the hunt."
        lavender_town:
          note: "The ghost town. Pokémon Tower looms."
          intro: "A quiet town shadowed by Pokémon Tower. You'll need the Silph Scope before you can clear it."
          steps:
            "1":
              title: "Try the Tower"
              text: "Enter Pokémon Tower. You'll hit an unbeatable ghost on 6F and can't pass yet."
            "2":
              title: "Detour for the Silph Scope"
              text: "Head west via Route 8 to Celadon and take down the Rocket Hideout for the Silph Scope."
            "3":
              title: "Return for the Poké Flute"
              text: "Come back, clear the Tower, and free Mr. Fuji. He gives the Poké Flute to wake the sleeping Snorlax."
        route_8:
          note: "West to Celadon. Pidgey, Abra, Jigglypuff."
          intro: "The road from Lavender toward Saffron and Celadon. Another shot at Abra."
          steps:
            "1":
              title: "Head west"
              text: "Clear the Lass, Gambler and Super Nerd as you head west toward Saffron's east gate."
            "2":
              title: "Take the Underground Path"
              text: "The Saffron guards want a drink. Skip them by tunnelling west under the city to Route 7."
        route_7:
          note: "Gate route into Celadon. Pidgey and Abra."
          intro: "A tiny connector between Saffron and Celadon. In and out."
          steps:
            "1":
              title: "Cross to Celadon"
              text: "Emerge from the Underground Path and walk west."
            "2":
              title: "Enter Celadon"
              text: "Pass through the gate into Celadon City."
        celadon_city:
          gym:
            intro: "A garden of small trees hiding several trainers, then Erika. Her Tangela (Lv 30), Weepinbell (Lv 32) and Gloom (Lv 32) fold to Fire, Flying, Psychic or Ice, so lead with one of those and carry status heals for their Sleep Powder and Stun Spore. Cut the small trees to reach her faster."
          note: "Erika's Gym. Rainbow Badge. Dept. Store, Eevee and the Game Corner."
          intro: "The big city. Shop the department store, grab an Eevee, beat Erika, and raid the Rocket Game Corner."
          steps:
            "1":
              title: "Shop the Dept. Store"
              text: "Grab the free TM18 (Counter) from the clerk on 3F. Buy three drinks from the rooftop vending machines and give them to the girl up there for TM13 (Ice Beam), TM48 (Rock Slide) and TM49 (Tri Attack). Buy evolution stones on 4F, and keep one spare drink for Saffron's guards."
            "2":
              title: "Take the Eevee, then the Gym"
              text: "Pick up the gift Eevee on the top floor of the Celadon Mansion (behind the Poké Center) and the Coin Case from the man in the restaurant, then enter the Gym behind the trees. Fire, Flying or Psychic beats Erika's Grass and Poison; Cut the small trees inside to skip the maze."
            "3":
              title: "Hit the Game Corner"
              text: "Win coins for prizes like Porygon and Vulpix, then find the poster switch to enter the Rocket Hideout."
          tips:
            eevee: "Free in the Condominiums. Evolve it with a stone into Vaporeon, Jolteon or Flareon."
            porygon: "The only Porygon in the game. 9999 Game Corner coins, but nowhere else to get it."
            vulpix: "Trade-only in the wild in Yellow. The Game Corner (1000 coins) is your easy source."
          oak:
            eevee: "Gift → one of Vaporeon / Jolteon / Flareon. Register the base once."
            porygon: "Game Corner exclusive. The only Porygon you'll get. Grab one."
        rocket_hideout:
          note: "Team Rocket's base. Get the Silph Scope."
          intro: "The maze under the Game Corner. Slide the spin tiles, beat Giovanni, and take the Silph Scope."
          steps:
            "1":
              title: "Open the stairs"
              text: "In the Game Corner, a man in black guards the lone poster on the north wall. Beat him, press the switch behind the poster, and the stairs down to B1F open."
            "2":
              title: "Ride the spin tiles for items"
              text: "Arrow tiles slide you in a straight line until you hit a stop, so line up each launch. Scattered across the B2F and B3F spinner mazes are a Nugget, a Moon Stone, TM07 (Horn Drill), a Rare Candy and TM10 (Double-Edge)."
            "3":
              title: "Grab the Lift Key"
              text: "On B4F, beat the Rocket Grunt who drops the Lift Key; an HP Up and TM02 (Razor Wind) sit in the same northwest room. Ride the elevator to reach Giovanni's office in the southeast."
            "4":
              title: "Beat Giovanni"
              text: "Clear Jessie & James, then Giovanni (Onix Lv 25, Rhyhorn Lv 24, Persian Lv 29); Water or Grass handles the first two. He drops the Silph Scope you need for Pokémon Tower."
        pokemon_tower:
          note: "Lavender's haunted tower. Ghosts and the Poké Flute."
          intro: "Climb the tower with the Silph Scope to reveal the ghosts, beat your rival, and free Mr. Fuji."
          steps:
            "1":
              title: "Climb with the Silph Scope"
              text: "Enter and head up; with the Scope, the wild Gastly, Haunter and Cubone finally show themselves. Sweep the floors for an Escape Rope (3F), an Elixir, Awakening and HP Up (4F), a hidden Elixir and a Nugget (5F), and an X Accuracy and Rare Candy (6F)."
            "2":
              title: "Beat your rival"
              text: "Blue fights you on 2F, his team around Lv 25. His Eevee has evolved by now, based on the record you set in your earlier battles."
            "3":
              title: "Clear the ghost Marowak"
              text: "On the upper floors, a Lv 30 ghost Marowak blocks the stairs. The Silph Scope lets you battle and defeat it, but it can never be caught."
            "4":
              title: "Free Mr. Fuji"
              text: "Beat Jessie & James on 7F and free Mr. Fuji at the top. He gives you the Poké Flute, which wakes the sleeping Snorlax on Routes 12 and 16."
          tips:
            gastly: "The only Gengar line in the game. Evolve Gastly to Haunter, then Gengar by trade."
          oak:
            gastly: "Ghost-heavy floors → Haunter, then Gengar by trade. The only line in-game."
            cubone: "A rare Tower catch → Marowak, a strong Ground type."
        route_12:
          note: "Silence Bridge. Oddish, Bellsprout, and a Snorlax."
          intro: "A long fishing bridge blocked by a sleeping Snorlax. Wake it with the Poké Flute to pass."
          steps:
            "1":
              title: "Wake the Snorlax"
              text: "Play the Poké Flute at the sleeping Snorlax on the bridge and battle (or KO) it to open the way."
            "2":
              title: "Work down the bridge"
              text: "Fight the Fishermen along the span; grab TM39 and the Super Rod from the houses."
            "3":
              title: "Head to Route 13"
              text: "Surf the east water for TM16 if you have Surf, then continue south to Route 13."
          tips:
            farfetchd: "A rare 5% grass catch. The only wild Farfetch'd around."
            snorlax: "One of just two Snorlax in the game. A Lv 30 wall. Sleep or paralyze, then throw balls."
          oak:
            slowpoke: "Surf the water for Slowpoke → Slowbro, a bulky Water/Psychic."
            farfetchd: "The rare duck of the grass. Grab the single wild Farfetch'd here."
        route_13:
          note: "Ledge maze south. Oddish, Bellsprout, Ditto."
          intro: "A winding fenced maze of ledges. Watch for a wild Ditto."
          steps:
            "1":
              title: "Wind through the maze"
              text: "Route 13 is a switchback of fences and ledges. Follow the path down from Route 12, clearing the Bird Keepers and Beauties as it snakes west and south."
            "2":
              title: "Grab the hidden items, then head on"
              text: "Two hidden items sit in gaps along the southern fence line: a Calcium and a PP Up. Sweep them with the Itemfinder, then continue toward Route 14."
          tips:
            ditto: "A 5% catch that Transforms into whatever it faces. Handy for the dex."
          oak:
            ditto: "Catch the Transforming blob here. A fun one and useful for breeding later gens."
        route_14:
          note: "Bird-and-biker row. Oddish, Bellsprout, Venonat."
          intro: "A long diagonal of Bird Keepers and Bikers. A rare Venomoth flies here."
          steps:
            "1":
              title: "Cut through the ledges"
              text: "Fight the Bird Keepers up top and the Bikers below. An Electric or Psychic type sweeps both."
            "2":
              title: "Head to Route 15"
              text: "Follow the ledges southwest down to Route 15."
        route_15:
          note: "West to Fuchsia. Oddish, Bellsprout, Venonat."
          intro: "The last leg into Fuchsia, through a fenced field of trainers."
          steps:
            "1":
              title: "Cross the field"
              text: "Work through the double row of Bikers, Bird Keepers and Beauties."
            "2":
              title: "Enter Fuchsia"
              text: "Cut into the NW pocket for TM20 if you like, then exit west into Fuchsia City."
        fuchsia_city:
          gym:
            intro: "The gym floor is a maze of invisible walls. Feel your way through, clearing the Jugglers and Tamers inside, then take on Koga. His three Venonat (Lv 44, 46, 48) and Venomoth (Lv 50) lean on Toxic and Double Team, so bring a fast Psychic attacker and carry Antidotes."
            puzzle:
              "1": "The whole room is blocked by invisible walls. Walk into open space until you hit one, then trace along it to find the gaps."
              "2": "Weave up and around the barriers toward the top of the room, taking each optional trainer as the path lets you reach them."
              "3": "The last opening leads to Koga. Bring a Psychic or Ground attacker and carry Antidotes for his Toxic."
          note: "Koga's Gym. Soul Badge. Safari Zone next door."
          intro: "Home of the Safari Zone. Beat Koga, then fetch Surf and Strength from the Safari."
          steps:
            "1":
              title: "Heal and enter the Gym"
              text: "Heal at the Center, then feel through the gym's invisible-wall maze to reach Koga. Bring a fast Psychic or Fire type and Antidotes for his Toxic."
            "2":
              title: "Fish the Warden's pond"
              text: "Super Rod the pond for a wild Gyarados, a Yellow-exclusive catch here."
            "3":
              title: "Raid the Safari Zone"
              text: "Head north into the Safari Zone for HM03 Surf and the Gold Teeth."
            "4":
              title: "Trade for Strength"
              text: "Return the Gold Teeth to the Warden for HM04 Strength; grab the Rare Candy inside once you have it."
          tips:
            gyarados: "Super Rod the Warden's pond for a wild Gyarados. No Magikarp grind needed."
          oak:
            gyarados: "Fish one straight out of the Warden's pond. A rare Yellow shortcut to Gyarados."
        safari_zone:
          note: "500-step catch park. Scyther, Pinsir, Chansey, Dratini and more."
          intro: "Pay in, get 30 Safari Balls, and grab the game's rarest catches. Plus HM03 Surf and the Gold Teeth."
          steps:
            "1":
              title: "Buy in"
              text_html: "Pay <span class=\"pn-money-value\"><span class=\"pn-money\" role=\"img\" aria-label=\"Poké Dollar\"></span><span class=\"pn-money-value__n\">500</span></span> at the gate for 30 Safari Balls; you get 500 steps per run."
            "2":
              title: "Hunt the rares and grab the TMs"
              text: "Sweep the areas for Scyther, Pinsir, Kangaskhan, Tauros, Chansey and Tangela; use Bait to keep them still, Rocks to make them easier to catch, and note that nothing faints here. Pick up TM37 (Egg Bomb) in Area 1, TM40 (Skull Bash) in Area 2, and TM32 (Double Team) in Area 3."
            "3":
              title: "Reach the Secret House"
              text: "In the far corner of Area 3, grab HM03 Surf from the official inside the Secret House, with the Gold Teeth lying nearby. A Max Revive and a couple of Max Potions are close by too."
            "4":
              title: "Grab Dratini"
              text: "Super Rod the ponds for Dratini, then leave and hand the Gold Teeth to the Warden for Strength."
          tips:
            scyther: "One of Yellow's two big bug bruisers, here alongside Pinsir. Bait, then Safari Balls."
            pinsir: "Yellow lets you catch both Pinsir and Scyther in the Safari. Grab this one too."
            kangaskhan: "A rare Safari-only Normal type. Patient bait-and-ball or nothing."
            chansey: "1% and flighty, but a huge EXP prize. Save a few balls for it."
            dratini: "The only easy Dratini. Super Rod the Safari ponds for the Dragonite line."
          oak:
            scyther: "Safari-exclusive bruiser. Grab one. No other easy source."
            pinsir: "The other Safari bug. Yellow lets you keep both Pinsir and Scyther."
            dratini: "Super Rod the ponds → Dragonair → Dragonite. Your one reliable shot."
            kangaskhan: "Rare and Safari-only. Bank one for the dex while you're here."
        route_16:
          note: "Cycling Road's top. Doduo and a Snorlax."
          intro: "The north gate of Cycling Road, blocked by a second Snorlax. Fly is hidden nearby."
          steps:
            "1":
              title: "Grab HM02 Fly"
              text: "Cut the tree in the NW to reach the house and pick up HM02 Fly."
            "2":
              title: "Wake the Snorlax"
              text: "Play the Poké Flute at the Snorlax on the path (Lv 30) and battle it to clear the gate."
            "3":
              title: "Mount Cycling Road"
              text: "Ride the Bike through the north gate onto Route 17."
          tips:
            snorlax: "The second and last Snorlax. Same Lv 30 wall. Sleep it, then throw balls."
          oak:
            doduo: "The route's common catch → Dodrio, a fast Normal/Flying."
            snorlax: "The last of two Snorlax. Wake with the Poké Flute and catch it now."
        route_17:
          note: "Cycling Road. Doduo, Ponyta, Fearow."
          intro: "A one-way downhill bike run lined with Bikers. Ponyta gallops in the grass strips."
          steps:
            "1":
              title: "Ride south"
              text: "Mount the Bike and coast south down Cycling Road; you cannot cross it on foot. Beat the Bikers and Cue Balls lining the slope as you roll past."
            "2":
              title: "Sweep the grass, grab the hidden items"
              text: "Stop in the grass strips for Ponyta. Tucked in the grass and along the fences are a Rare Candy, a Full Restore, a Max Revive, a PP Up and a Max Elixir; the Itemfinder helps pin them. Exit the south gate to Route 18."
          oak:
            ponyta: "A fiery grass catch → Rapidash. One of few Fire types in Yellow."
        route_18:
          note: "East to Fuchsia. Spearow, Rattata, Doduo."
          intro: "A short strip of Bird Keepers bridging Cycling Road to Fuchsia."
          trades:
            parasect:
              npc: "COOK"
              title: "Parasect"
              where: "Upstairs in the Route 18 gate"
              note: "A ready-made Parasect that levels fast thanks to the traded-XP bonus. Tangela is a Safari Zone catch."
          steps:
            "1":
              title: "Cross east"
              text: "Beat the three Bird Keepers along the narrow land strip."
            "2":
              title: "Enter Fuchsia"
              text: "Continue east into Fuchsia City."
        saffron_city:
          gym:
            intro: "Warp pads teleport you around the gym in a fixed loop. Take the right pads to reach Sabrina, whose Abra, Kadabra and Alakazam (all Lv 50) hit like a truck. Psychic has no true counter in Gen 1, so out-level her or lead with a strong Bug attacker like Pinsir or Scyther."
            puzzle:
              "1": "Step onto a warp pad and it flings you to another room. Each room has one trainer and two pads: one loops back, one moves you on."
              "2": "The fastest line: from the entrance take the southeast pad, then the northwest pad, then the southwest pad, and the southwest pad once more. Each hop drops you on one trainer to clear, and that sequence lands you in Sabrina's room."
              "3": "The final warp drops you beside Sabrina. Psychic has no counters in Gen 1, so out-level her or lead with a strong Bug attacker."
          note: "Sabrina's Gym. Marsh Badge. Silph Co. and the Dojo."
          intro: "A central city held by Rocket. Free Silph Co., beat Sabrina, and claim a fighter from the Dojo."
          steps:
            "1":
              title: "Bribe the guards"
              text: "Bring a drink from Celadon's Dept. Store to get past each blocked city gate."
            "2":
              title: "Free Silph Co. first"
              text: "The gym stays locked until you clear Rocket-held Silph Co. (see Silph Co.), then enter and solve the teleport-pad maze to Sabrina."
            "3":
              title: "Claim a fighter"
              text: "Beat the Karate Master at the Fighting Dojo to take a free Hitmonlee or Hitmonchan."
          oak:
            hitmonlee: "Free from the Dojo. Pick Hitmonlee or Hitmonchan (you only get one)."
        silph_co:
          note: "Rocket HQ takeover. Lapras and the Master Ball."
          intro: "An 11-floor warp maze. Grab the Card Key, rescue Lapras, and beat Giovanni for the Master Ball."
          steps:
            "1":
              title: "Get the Card Key"
              text: "Reach 5F and grab the Card Key. It opens the locked doors across the warp-tile maze."
            "2":
              title: "Rescue Lapras"
              text: "On 7F, take the free Lapras from the employee (and fight your rival there)."
            "3":
              title: "Beat Giovanni"
              text: "Work up to 11F and defeat Giovanni (Nidorino Lv 37, Rhyhorn Lv 37, Persian Lv 35, Nidoqueen Lv 41); Ground moves like Dig and Earthquake carry the fight. Beating him breaks the takeover."
            "4":
              title: "Take the Master Ball"
              text: "Talk to the Silph president for the Master Ball. Save it for a legendary."
          tips:
            lapras: "The only in-game Lapras. A superb Water/Ice tank. Don't miss it on 7F."
          oak:
            lapras: "Free on 7F → a top Water/Ice tank. The only Lapras you'll get in-game."
        route_19:
          note: "Water route south of Fuchsia. Needs Surf."
          intro: "Open water south of Fuchsia, thick with Tentacool and Swimmers. Surf required."
          steps:
            "1":
              title: "Surf out"
              text: "Surf south from Fuchsia, fishing or battling the Swimmers and Beauties."
            "2":
              title: "Head to Route 20"
              text: "Continue to the beach that leads west into Route 20."
        route_20:
          note: "Water route to Seafoam. Tentacool, Staryu, Shellder."
          intro: "The channel to Seafoam Islands. The only way west toward Cinnabar."
          steps:
            "1":
              title: "Surf west"
              text: "Clear the Swimmers on the east half as you Surf west."
            "2":
              title: "Enter Seafoam"
              text: "Dive into the Seafoam Islands cave in the middle of the route."
        seafoam_islands:
          note: "Boulder-puzzle cave. Wild Articuno inside."
          intro: "A current-filled cave. Push boulders with Strength to slow the water, then catch Articuno."
          steps:
            "1":
              title: "Bring Surf and Strength"
              text: "You need both HMs; Strength pushes boulders into the current holes to make the water passable."
            "2":
              title: "Dam the currents"
              text: "Drop boulders down the gaps floor to floor to open a Surf path down to B4F."
            "3":
              title: "Catch Articuno"
              text: "On B4F, Surf to the sleeping Articuno (Lv 50). Save first. It's a great Master Ball target."
            "4":
              title: "Exit toward Cinnabar"
              text: "Leave the far west exit onto the open sea toward Cinnabar Island."
          tips:
            articuno: "A one-time Lv 50 legendary. Save first, sleep/paralyze it, and use the Master Ball or a lot of Ultra Balls."
          oak:
            seel: "A cave catch → Dewgong, a solid Water/Ice. Grab the base."
            articuno: "The Ice legendary of Seafoam. One shot only. Catch it now."
        power_plant:
          note: "Optional Surf detour. Electric mons, a rare Muk, and Zapdos."
          intro: "An abandoned plant off Route 10, reachable only by Surf. Electric and Poison types roam the floors, and the legendary Zapdos waits deep inside."
          steps:
            "1":
              title: "Surf in from Route 10"
              text: "Once you have Surf, ride the water south from the Rock Tunnel entrance on Route 10 to reach the plant's door. Bring Repels if you only care about the items and Zapdos."
            "2":
              title: "Sweep the floors, mind the fake items"
              text: "Grab TM25 (Thunder), TM33 (Reflect), Carbos, HP Up, a Rare Candy, a PP Up and a Max Elixir as you wind through. Several item balls are Voltorb or Electrode in disguise, so expect a fight when you reach for one."
            "3":
              title: "Catch Zapdos"
              text: "Zapdos (Lv 50) waits near the back of the plant. Save first, chip it with Rock or Ice, put it to sleep or paralyze it, then throw Ultra Balls or the Master Ball."
          tips:
            zapdos: "The Electric legendary, a one-time Lv 50 static. Save before you touch it, then sleep or paralyze and ball it down."
          oak:
            zapdos: "The Electric bird of the Power Plant. One shot only. Catch it while you are here."
            voltorb: "All over the floors (and disguised as items) → Electrode. Grab one for the dex."
        cinnabar_island:
          gym:
            intro: "Locked doors bar the way to Blaine, each opened by answering a quiz or beating the trainer behind it. His Ninetales (Lv 48), Rapidash (Lv 50) and Arcanine (Lv 54) hit hard and fast, so bring a Water, Rock or Ground attacker and pack Burn Heals."
            puzzle:
              "1": "Each door poses a yes or no Pokémon quiz. Answer correctly and it opens; answer wrong and you battle the trainer behind it, which opens it anyway."
              "2": "If you would rather not guess, the answers in order are yes, no, no, no, yes, no. Or skip the quizzes and fight every trainer instead; the doors open either way and both routes reach the back."
              "3": "The final door opens onto Blaine. A single strong Water, Rock or Ground move drops his Ninetales, Rapidash and Arcanine in a hurry."
          note: "Blaine's Gym. Volcano Badge. Fossil lab."
          intro: "A volcanic island. Revive your fossils at the lab, get the Secret Key from the Mansion, then beat Blaine."
          trades:
            muk:
              npc: "SCIENTIST"
              title: "Muk"
              where: "The fossil room of the Pokémon Lab"
              note: "A high-level Muk with no grinding. Kangaskhan is a Safari Zone catch."
            rhydon:
              npc: "OLD MAN"
              title: "Rhydon"
              where: "The trade room of the Pokémon Lab"
              note: "A traded Rhydon comes in strong and gains boosted XP."
            dewgong:
              npc: "BEAUTY"
              title: "Dewgong"
              where: "The trade room of the Pokémon Lab"
              note: "Dewgong for a Growlithe, plus the traded-XP bonus. Growlithe roams the Pokémon Mansion next door."
          steps:
            "1":
              title: "Clear the Mansion first"
              text: "Blaine's gym is locked. Cross the street to the Pokemon Mansion and fetch the Secret Key."
            "2":
              title: "Hand in a fossil, then the Gym"
              text: "Give a fossil to the scientist at the Lab, then open the gym with the Secret Key and work the quiz doors to Blaine. Water, Ground or Rock melts his Fire team."
            "3":
              title: "Collect your fossil and move on"
              text: "Return to the Lab later for the revived fossil Pokemon, then Surf out toward the last badge."
          tips:
            omanyte: "Revive the Helix Fossil here → Omanyte, then Omastar. A Rock/Water only found this way."
            kabuto: "Revive the Dome Fossil → Kabuto, then Kabutops. The other fossil line."
            aerodactyl: "Revive the Old Amber (Pewter museum) → Aerodactyl, a rare Rock/Flying."
          oak:
            omanyte: "Revive whichever fossil you chose in Mt. Moon. Helix → Omanyte."
            kabuto: "Dome Fossil → Kabuto. You can only revive the one fossil you kept."
            aerodactyl: "Old Amber from Pewter's museum → Aerodactyl. Register the single specimen."
        pokemon_mansion:
          note: "Burnt-out mansion. Fire types and the Secret Key."
          intro: "A statue-switch maze full of Fire and Poison mons. Find the Secret Key on B1F."
          steps:
            "1":
              title: "Flip the statue switches"
              text: "The mansion is a maze of barred paths opened by hidden switches inside the statues. Inspect the statues floor by floor to lower the barriers, grabbing the hidden Moon Stone by the 1F pillars and the Escape Rope, Calcium and Iron on the upper floors as you climb."
            "2":
              title: "Work down to B1F"
              text: "Ride the switch-maze down through the floors to B1F. Along the basement grab TM14 (Blizzard) and TM22 (SolarBeam), a Full Restore and a couple of Rare Candy."
            "3":
              title: "Grab the Secret Key"
              text: "The Secret Key sits in the center of the west-central room on B1F, with a hidden Rare Candy in that room's northwest corner. Take it, then cross the street to Blaine's gym."
          tips:
            vulpix: "Yellow puts both Vulpix and Growlithe here. An easy wild Vulpix for once."
            growlithe: "The other Fire dog, here in the same mansion → Arcanine with a Fire Stone."
            magmar: "A rare Fire catch on the lower floors. One of few Magmar sources."
          oak:
            vulpix: "Wild here in Yellow (elsewhere trade-only) → Ninetales. Grab one."
            growlithe: "Also wild here → Arcanine with a Fire Stone. Log the base."
            magmar: "A rare mansion catch. A strong Fire attacker. Bank one."
        route_21:
          note: "Water route back to Pallet. Fishing plus a Pallet-side grass patch."
          intro: "The sea route between Cinnabar and Pallet. Surf and fish it on the way back to Viridian for the last gym; a small grass patch by Pallet holds land catches."
          steps:
            "1":
              title: "Surf north toward Pallet"
              text: "From Cinnabar, Surf north up the channel, clearing the Swimmers as you go. Tentacool fills the open water."
            "2":
              title: "Fish and sweep the grass"
              text: "Super Rod the water for Magikarp, Goldeen, Shellder and Staryu, then check the grass patch just south of Pallet for Pidgey and Rattata plus wild Pidgeotto and Raticate. Land at Pallet and head up to Viridian for the Earth Badge."
          tips:
            magikarp: "Fish one here and grind it to Lv 20; it becomes Gyarados, one of the strongest Water types in the game."
            goldeen: "A reliable Super Rod catch → Seaking. An easy spot to log the line."
          oak:
            magikarp: "Super Rod it here → Gyarados. Weak now, monstrous once it evolves."
            goldeen: "Fish one → Seaking. Register the base while you are fishing anyway."
        viridian_gym:
          gym:
            intro: "The last Kanto gym, a spinner-tile maze packed with eight trainers. Giovanni waits at the top with Dugtrio (Lv 50), Persian (Lv 53), Nidoqueen (Lv 53), Nidoking (Lv 55) and Rhydon (Lv 55). Dugtrio's Fissure and Rhydon's Horn Drill are one-hit KOs, so out-speed them and pack Water, Grass or Ice."
            puzzle:
              "1": "Spinner tiles fling you in a straight line until you hit a stop tile. Plan each launch so you land where you can reach the next trainer."
              "2": "Clear trainers to open the northern path, then ride the spinners north and west, correcting your line at each stop toward Giovanni."
              "3": "The final spinners drop you in front of Giovanni. Watch for Fissure and Horn Drill one-hit KOs and lead with a fast Water or Ice attacker."
          note: "Giovanni's Gym. Earth Badge. The 8th badge."
          intro: "The final Kanto gym, back in Viridian. Beat Giovanni's Ground team for the last badge."
          steps:
            "1":
              title: "Prep and enter the Gym"
              text: "Stock Potions and Revives, then ride the spinner tiles through the eight trainers to Giovanni. Bring Water, Grass or Ice and watch for Fissure and Horn Drill."
            "2":
              title: "On to Victory Road"
              text: "With the Earth Badge and all eight in hand, head back to Route 22 and push west into Victory Road."
        victory_road:
          note: "The League gate. Boulder puzzles and Moltres."
          intro: "A three-floor boulder maze that needs all 8 badges and Strength. Moltres roosts inside."
          steps:
            "1":
              title: "Bring Strength"
              text: "You need all 8 badges to enter, plus Strength for the boulders (and Surf and Flash to move through). The cave climbs across three floors."
            "2":
              title: "Push the boulders onto the switches"
              text: "Each floor is gated by a boulder puzzle: use Strength to shove a boulder onto the floor switch, and the barrier drops. Grab TM05 (Mega Kick), TM17 (Submission), TM43 (Sky Attack) and TM47 (Explosion) tucked around the floors."
            "3":
              title: "Catch Moltres"
              text: "On the west side of 2F, Moltres (Lv 50) is roosting. Save first, weaken it with Water, Electric or Rock, sleep or paralyze it, then throw Ultra Balls."
            "4":
              title: "Climb to the Plateau"
              text: "Collect the Max Revive and a Full Restore on the way up, then leave through the top exit onto the approach to Indigo Plateau."
          tips:
            moltres: "The Fire legendary of Victory Road. A one-time Lv 50. Save first, then chip and ball it."
          oak:
            moltres: "The Fire bird roosting in Victory Road. One shot only. Catch it on the way through."
        route_23:
          note: "Badge checkpoints to the League. High-level grass."
          intro: "The gated road to the League. Every guard checks a badge. Wild mons here are strong."
          steps:
            "1":
              title: "Pass the checkpoints"
              text: "Head north from Viridian; each guard post opens only if you hold the right badge, so you need all 8."
            "2":
              title: "Surf the channel"
              text: "Surf north across the water past the mid-route gates."
            "3":
              title: "Enter Victory Road"
              text: "Continue north through the final gate into Victory Road."
        indigo_plateau:
          note: "The Pokémon League. Elite Four and Champion Blue."
          intro: "The final five battles, back to back, with no healing between rooms. Stock up first."
          steps:
            "1":
              title: "Stock up"
              text: "Heal and buy Full Restores, status heals and Ultra Balls in the lobby before you enter."
            "2":
              title: "Beat the Elite Four"
              text: "Lorelei (Ice/Water), Bruno (Fighting/Rock), Agatha (Ghost/Poison), Lance (Dragon). Hit each with its weakness."
            "3":
              title: "Beat Champion Blue"
              text: "Your rival leads with Sandslash (Lv 61) and fields Alakazam, Exeggutor, a Magneton or Cloyster, Ninetales, and the Eeveelution his Eevee became (Lv 65). Alakazam carries Recover, so break it with physical moves. Win to enter the Hall of Fame."
        cerulean_cave:
          note: "Post-game dungeon. The strongest wilds. And Mewtwo."
          intro: "Unlocked after becoming Champion. The toughest wild Pokémon in Kanto, with Mewtwo waiting at the bottom."
          steps:
            "1":
              title: "Surf in"
              text: "After the Hall of Fame, Surf northwest across the water from Cerulean City into the cave mouth."
            "2":
              title: "Descend to B1F"
              text: "Work down through the Lv 45-65 wilds (Rhydon, Chansey, Ditto, Kadabra and more). The floors are stuffed with high-end loot: several Ultra Balls, Max Revives, Rare Candy, a Full Restore and Max Elixirs. Grab them as you spiral down to B1F."
            "3":
              title: "Save before Mewtwo"
              text: "Cross B1F and Surf to the small island at the far south. Mewtwo waits there; save your game before you step onto the platform, since you get a single shot at it."
            "4":
              title: "Catch Mewtwo"
              text: "Mewtwo is Lv 70 and spams Recover, so put it to sleep or paralyze it first, chip it low, then throw the Master Ball, or settle in with a big stack of Ultra Balls."
          tips:
            mewtwo: "The strongest Pokémon in the game, a Lv 70 static. The Master Ball is made for this. Or sleep it and pray."
          oak:
            mewtwo: "The post-game legendary at the bottom of the cave. Save the Master Ball for it."
