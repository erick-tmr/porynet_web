      map_place_kind_ship: "A room aboard the S.S. Anne."
      map_place_kind_dojo: "A dojo. Its fighters hand a Pokémon to whoever beats them."
      map_place_kind_league: "A Pokémon League room. No turning back once you enter."
      map_place_kind_hotel: "A hotel. Nobody ever checks in, it is scenery."
      map_place_kind_facility: "A building you can walk into."
      map_place_note_viridian_nickname: "Not where you rename Pokémon, just a tip house with a pet Spearow called SPEARY. The Name Rater in Lavender Town does the renaming."
      map_place_note_name_rater: "The Name Rater lives here. Bring any Pokémon to give it a new nickname, as often as you like."
      map_place_note_viridian_school: "Kanto's trainer school. The blackboard drills the basics, and the kids pass on catching and taming tips."
      map_place_note_reds_house: "Your own home. Mom sends you next door to Prof. Oak and frets over your Pokémon; the TV is playing a movie."
      map_place_note_cerulean_trashed: "Team Rocket smashed through and dug out the back wall here, robbing the owner of his Dig TM on the way."
      map_place_note_cerulean_badge: "A man here explains what each of your eight badges does: its stat boost, its obedience cap and its field move."
      map_place_note_pewter_nidoran: "The family explains traded Pokémon: they grow fast but may ignore a trainer who lacks enough badges."
      map_place_note_pewter_speech: "Two tips: a wild Pokémon is easier to catch hurt or asleep, and some moves only its trainer can teach."
      map_place_note_saffron_pidgey: "The Copycat's pen pal lives here, beside a note explaining PP Up, which raises a move's PP."
      map_place_note_vermilion_pidgey: "A trainer sends letters to Saffron by carrier Pidgey. Flavor only, nothing to collect."
      map_place_note_route2_trade: "Trade a Clefairy here for MILES the Mr. Mime, the easiest way to add it to your dex."
      map_place_note_vermilion_trade: "Despite the name, no trade: a gentleman only warns that an HM move can't be replaced once taught."
      map_place_note_celadon_chief: "The Game Corner's Rocket boss brags about the rigged slots; a guard swears the prize poster hides no switch."
      map_place_note_copycats: "The ground floor of the Copycat's home. She, and the TM Mimic she gives, are up the stairs."
      map_place_note_daycare: "The Day-Care man raises one Pokémon for you, levelling it up for a fee while you travel."
      map_place_note_bills_grandpa: "Bill's grandpa lives here, with gossip about Bill and the Safari Zone Warden. Flavor only."
      map_place_note_lavender_cubone: "A girl mourns the Cubone whose mother Team Rocket killed; clear the tower's ghost and she confirms it is at peace."
      map_place_note_beach_house: "Pikachu's Beach. If your Pikachu can Surf, the dude here runs a wave-riding minigame for high scores."
      map_place_note_safari_rest: "A rest stop inside the Safari Zone: a bench, and a few worn-out catchers comparing their hauls."
      map_place_note_game_corner: "Rows of slot machines, and a poster hiding the switch to Team Rocket's basement hideout."
      map_place_note_game_corner_prizes: "Cash in your Game Corner coins here for prize TMs and hard-to-find Pokémon."
      map_place_note_power_plant: "An abandoned plant crawling with Electric Pokémon and Electrode disguised as items; Zapdos roosts at the far end."
      map_place_note_cinnabar_lab: "The lab where scientists bring your dome, helix or old amber fossils back to life as Pokémon."
      map_place_note_pokemon_mansion: "The burned-out mansion. Its maze hides the Secret Key to Cinnabar's Gym, and diary pages telling of Mewtwo."
      map_place_note_silph_co: "Silph Co., seized by Team Rocket. Fight up through the floors to Giovanni, and the Master Ball, at the top."
      map_place_note_rocket_hideout: "Team Rocket's base under the Game Corner. Giovanni waits at the bottom, guarding the Silph Scope."
      map_npc_pallet_technology: "\"Technology is incredible!\" The fisher who talks up PC item storage, a classic Kanto one-liner."
      map_npc_route1_potion: "Talk to him for a free Potion, a sample from the Viridian Mart. Handy before the forest."
      map_npc_route24_nugget: "At the top of Nugget Bridge he hands you a Nugget, then asks you to join Team Rocket. Say no."
      map_npc_silph_master_ball: "Beat Giovanni and the president thanks you with the Master Ball, the only one in the game."
